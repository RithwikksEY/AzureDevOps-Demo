name: CI Pipeline
 
on:
  push:
    branches: [ main ]
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Build
        run: |
          echo "Building 🚀"
          echo "Hello from GitHub Actions" > output.txt
          cat output.txt
 
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: output.txt
 
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Testing ✅"
 
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "Deploying 🚀"
